name: CI

on:
  pull_request:
  push:
    branches:
      - fix/full-processing-conformance

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Next route types and typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test
