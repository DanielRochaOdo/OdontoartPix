name: CI

on:
  pull_request:
  push:
    branches:
      - fix/full-processing-conformance

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Next route types and typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3

      - name: Stop on typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Run tests
        run: npm run test

      - name: Build production bundle
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
          MENSALIDADES_API_BASE_URL: https://example.com
          MENSALIDADES_API_TOKEN: ci-token
          CRON_SECRET: ci-cron-secret
        run: npm run build
